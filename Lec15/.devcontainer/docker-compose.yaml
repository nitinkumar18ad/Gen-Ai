app:
  build:
    context: ...
    dockerfile: .devcontainer/Dockerfile

  volumes:
    - ..:/workspace:cached

  command: sleep infinity

  depends_on:
    - mongo
    - valkey

  restart: unless-stopped

  ports:
    - "3000:3000"
    - "8000:8000"

  environment:
    - MONGO_URI=mongodb://mongo:27017
    - REDIS_HOST=valkey
    - REDIS_PORT=6379